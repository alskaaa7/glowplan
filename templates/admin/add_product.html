{# templates/admin/add_product.html - добавление продукта в базу #}
{% extends "base.html" %}
{% block title %}Добавить продукт в базу{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Добавить продукт в базу</h1>
</div>
<div class="form-card">
    <form method="POST" class="auth-form">
        <div class="form-group">
            <label>Название</label>
            <input type="text" name="name" required placeholder="Gentle Foam Cleanser">
        </div>
        <div class="form-group">
            <label>Бренд</label>
            <input type="text" name="brand" required placeholder="CeraVe">
        </div>
        <div class="form-group">
            <label>Категория</label>
            <select name="category">
                {% for val, label in categories %}
                <option value="{{ val }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>PAO (дней после вскрытия)</label>
            <input type="number" name="pao_days" value="365" min="1" max="1825">
        </div>
        <div class="form-group">
            <label>Ингредиенты <span class="hint">(через запятую: retinol, aha, bha, vitamin_c, niacinamide, spf)</span></label>
            <input type="text" name="ingredients" placeholder="retinol, vitamin_e">
        </div>
        <div class="form-group">
            <label>Описание</label>
            <input type="text" name="description" placeholder="Мягкая пенка для умывания">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn--primary">Добавить</button>
            <a href="{{ url_for('admin.products') }}" class="btn btn--ghost">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
